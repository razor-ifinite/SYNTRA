server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/syntra_auth}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  # Secret key used for signing JWT tokens (HMAC-SHA256 requires at least 256 bits/32 bytes of key size)
  # The default below is a base64 encoded representation of a 256-bit key
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1hbmQtc3Ryb25nLWtleS1mb3Itc3ludHJhLWp3dC10b2tlbi1zaWduaW5nLXByb2R1Y3Rpb24=}
  # Token expiration duration in milliseconds (default: 24 hours)
  expiration: ${JWT_EXPIRATION:86400000}
